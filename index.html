
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wbwave</title>
    <style>
        :root {
            --bg: #f3f3f3;
            --surface: #ffffff;
            --accent: #0067c0;
            --text: #1a1a1a;
            --border: #e5e5e5;
        }

        body {
            margin: 0;
            font-family: "Segoe UI Variable Static Display", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 320px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        #sidebar.hidden {
            transform: translateX(-320px);
        }

        #toggle-btn {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text);
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }

        h1 { font-size: 20px; font-weight: 600; margin: 0; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; font-weight: 500; opacity: 0.8; }

        select, input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        button.main-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button.main-btn:hover { opacity: 0.9; }

        #preview-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #paper-container {
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative;
            /* Scale container to fit screen but keep aspect ratio */
            max-width: 90vw;
            max-height: 90vh;
            aspect-ratio: 11.43 / 16.51;
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            object-fit: contain;
        }

        .footer { margin-top: auto; font-size: 12px; }
        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="toggle-btn">◀</div>
    <h1>wbwave</h1>
    
    <div class="control-group">
        <label>Art Style</label>
        <select id="style">
            <option value="sine">Classic Sine Waves</option>
            <option value="mesh">Digital Mesh</option>
            <option value="interference">Interference Pattern</option>
            <option value="ribbons">Flowing Ribbons</option>
            <option value="noise">Topographic Noise</option>
            <option value="strands">Vertical Strands</option>
        </select>
    </div>

    <div class="control-group">
        <label>Wave Density</label>
        <input type="range" id="density" min="5" max="120" value="50">
    </div>

    <div class="control-group">
        <label>Amplitude / Chaos</label>
        <input type="range" id="amplitude" min="5" max="200" value="60">
    </div>

    <button id="generate" class="main-btn">Generate Random</button>
    <button id="download" class="main-btn" style="background: #e1e1e1; color: #000;">Download JPG</button>

    <div class="footer">
        made by <a href="https://perlch.github.io" target="_blank">perlch</a>
    </div>
</div>

<div id="preview-area">
    <div id="paper-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
